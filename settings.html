<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Settings - Synology Download Manager</title>
  <link rel="stylesheet" href="settings.css"/>
  <script src="settings.js" type="module"></script>
</head>

<body>
<main x-data="settings_page()" :class="{ 'settings--loading': loading }">

  <form @submit.prevent="handleLogin()">

    <h1 x-text="__('extName')">Synology Download Manager</h1>
    <h2 x-text="__('openSettings')">Settings</h2>

    <div class="form-group">
      <label for="host" x-text="__('hostLabel')">Synology Host</label>
      <input id="host" placeholder="https://your-synology:5001" x-model="host" :disabled="loading"/>
    </div>
    <div class="form-group">
      <label for="account" x-text="__('usernameLabel')">Username</label>
      <input id="account" x-model="account" :disabled="loading"/>
    </div>
    <div class="form-group">
      <label for="passwd" x-text="__('passwordLabel')">Password</label>
      <input type="password" id="passwd" x-model="passwd" :disabled="loading"/>
    </div>
    <div class="action-group">
      <button type="submit" x-text="__('saveBtn')">Save</button>
      <span x-text="messageText" :class="'status--' + messageType"></span>
    </div>
  </form>

  <div class="bottom-group">
    <a href="" @click.prevent="handleLogout()" x-text="__('clearSettings')"> Clear Settings </a>
  </div>
</main>
</body>
</html>

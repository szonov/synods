<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Synology Download Manager</title>
    <link rel="stylesheet" href="popup.css">
    <script src="popup.js" type="module"></script>
</head>

<body>
<div class="container">
    <div class="header">
        <h1 data-i18n="extName">Synology Download Manager</h1>

        <a href="#" id="clearAll" title="Clear all downloads" data-i18n="title,clearAll" class="icon clear-icon">
            <svg fill="currentColor" width="20" height="20" viewBox="0 0 100 100"
                 enable-background="new 0 0 100 100" version="1.0" xml:space="preserve"
                 xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                    <g stroke-width="0"></g>
                <g stroke-linecap="round" stroke-linejoin="round"></g>
                <g>
                        <path
                                d="M63.336,43.333H53.334V16.667c0-3.682-2.986-6.667-6.667-6.667C42.988,10,40,12.985,40,16.667v26.67H30 c-3.682,0-6.666,2.981-6.666,6.663v6.667H70V50C70,46.318,67.018,43.333,63.336,43.333z">
                        </path>
                    <path d="M23.333,90h53.333C72.221,85.554,70,79.727,70,73.899V61.667H23.333V90z"></path>
                    </g>
                </svg>
        </a>

        <a href="#" id="openDsmLink" title="Open Download Station" data-i18n="title,openDsm"
           class="icon open-synology">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h6v6"/>
                <path d="M10 14 21 3"/>
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            </svg>
        </a>

        <a href="#" id="openSettingsLink" title="Settings" data-i18n="title,openSettings"
           class="icon open-settings">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                        d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </a>
    </div>


    <div id="downloadsList" class="downloads-list">
        <template id="downloadTemplate">
            <div class="row">
                <div class="info">
                    <span data-title>Download Title</span><br/>
                    <span data-status-message>Status line</span>
                    <div data-status-icon>x</div>
                </div>
                <div class="actions">
                    <a href="" class="action-link task-resume" data-action="resume">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>
                    </a>

                    <a href="" class="action-link task-pause" data-action="pause">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="14" y="3" width="5" height="18" rx="1"/>
                            <rect x="5" y="3" width="5" height="18" rx="1"/>
                        </svg>
                    </a>

                    <a href="" class="action-link task-remove" data-action="remove">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="m15 9-6 6"/>
                            <path d="m9 9 6 6"/>
                        </svg>
                    </a>
                </div>
            </div>

            <div class="row">
                <progress data-progress max="100" value="0" style="width: 100%;">0%</progress>
            </div>
        </template>
        <!--            <div class="loading">Loading...</div>-->
    </div>

    <!--        <div class="toolbar">-->
    <!--            <span id="lastUpdateTime"></span>-->
    <!--        </div>-->



    <footer>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
            <path d="M12 5l0 14"/>
            <path d="M18 13l-6 6"/>
            <path d="M6 13l6 6"/>
        </svg>
        <span id="totalDownloadSpeed">12.33 MB/s</span>

        <span class="spacer"></span>

        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
            <path d="M12 5l0 14"/>
            <path d="M18 11l-6 -6"/>
            <path d="M6 11l6 -6"/>
        </svg>
        <span id="totalUploadSpeed">10.30 KB/s</span>

        <span class="updated_at" title="Обновлено несколько секунд назад">
<!--            Обновлено: -->
            <!--            <span id="updatedAt">14:53:33</span>-->
                <span id="lastUpdateTime"></span>
        </span>
    </footer>

</div>


</body>

</html>

<!doctype html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Synology Download Manager</title>
  <link rel="stylesheet" href="popup.css"/>
  <script src="./lib/ui/task-actions.js" type="module"></script>
  <script src="./lib/ui/status-icon.js" type="module"></script>
  <script src="popup.js" type="module"></script>
</head>
<body class="">
<div class="container">
  <header>
    <h1 data-i18n="extName">Synology Download Manager</h1>

    <a href="#" id="openDsmBtn" data-i18n="title,openDsm">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h6v6"/>
        <path d="M10 14 21 3"/>
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
      </svg>
    </a>

    <a href="#" id="openSettingsBtn" data-i18n="title,openSettings">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
        <circle cx="12" cy="12" r="2"/>
      </svg>
    </a>
  </header>

  <div id="downloadsList" class="downloads-list">
  </div>

  <div>
    <div id="loader" class="empty">Loading...</div>
    <div id="noActiveTasks" class="empty d-none" data-i18n="noActiveTasks"></div>
    <div id="configRequired" class="empty d-none" data-i18n="configRequired"></div>
  </div>

  <template id="downloadTemplate">
    <div class="row">
      <div class="info">
        <span data-title>Download Title</span><br/>
        <span data-status-message>Status line</span>
        <status-icon></status-icon>
      </div>
      <task-actions></task-actions>
    </div>

    <div class="row">
      <progress data-progress max="100" value="0" style="width: 100%">0%</progress>
    </div>
  </template>

  <div id="errorLine" class="error-line d-none"></div>

  <footer id="footer">
    <svg class="icon-down" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
      <path d="M12 5l0 14"/>
      <path d="M18 13l-6 6"/>
      <path d="M6 13l6 6"/>
    </svg>

    <span id="totalDownloadSpeed"> –.– B/s</span>

    <span class="spacer"></span>

    <svg class="icon-up" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
      <path d="M12 5l0 14"/>
      <path d="M18 11l-6 -6"/>
      <path d="M6 11l6 -6"/>
    </svg>

    <span id="totalUploadSpeed"> –.– B/s</span>

    <span class="last-update-box">
      <span data-i18n="lastUpdate"></span>: <span id="lastUpdateTime"> –– </span>
    </span>
  </footer>
</div>
</body>
</html>
